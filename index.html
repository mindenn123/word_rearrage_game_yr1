<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 关键：确保视口设置正确，允许缩放但默认宽度为设备宽度 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>🧩 词句重组 · 多题挑战</title>
    <!-- SortableJS 轻量拖拽库 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f9e7b3 0%, #f5d0a9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', '幼圆', 'Yuanti SC', sans-serif;
            padding: 6px;
            margin: 0;
            touch-action: pan-y; /* 允许垂直滚动 */
        }

        .game-box {
            max-width: 1100px;
            width: 100%;
            background-color: rgba(255, 251, 240, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2), 0 0 0 5px #ffeecc inset;
            padding: 18px 12px 25px 12px;
            border: 4px solid #ffb882;
        }

        h1 {
            font-size: min(8vw, 2.8rem);
            text-align: center;
            color: #9b5e2e;
            text-shadow: 2px 2px 0 #ffd78c, 3px 3px 0 rgba(0,0,0,0.1);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .subhead {
            font-size: min(5vw, 1.7rem);
            font-weight: bold;
            color: #bd7a4a;
            background: #fffae9;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            margin: 0 auto 12px auto;
            border-radius: 40px;
            box-shadow: 0 4px 0 #e5b887;
            border: 3px solid #f5b777;
        }

        /* 导航栏 + 题号 */
        .nav-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px 12px;
            background: #fbe6c0;
            border-radius: 50px;
            padding: 10px 12px;
            margin: 5px 0 18px 0;
            border: 4px solid #f5b072;
            box-shadow: 0 5px 0 #c17d3f;
        }

        .question-badge {
            font-size: min(5vw, 2rem);
            font-weight: bold;
            background: #fcf3da;
            padding: 6px 16px;
            border-radius: 40px;
            border: 3px solid #d4924b;
            color: #5f3a14;
            white-space: nowrap;
        }

        .nav-btn {
            font-size: min(4.5vw, 1.8rem);
            font-weight: bold;
            background: #ffdbb5;
            border: 4px solid #e5944a;
            box-shadow: 0 5px 0 #aa5f25;
            color: #572f0c;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 40px;
            transition: all 0.06s linear;
            touch-action: manipulation;
        }
        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #aa5f25;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #aa5f25;
            pointer-events: none;
        }

        /* 目标句子提示牌 - 默认隐藏 */
        .target-sentence {
            background: #b5e1b9;
            border: 4px dashed #2b6e3f;
            border-radius: 40px;
            padding: 12px 10px;
            margin: 12px 0 20px 0;
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 12px;
            box-shadow: 0 6px 0 #56803b;
        }
        .target-sentence.visible {
            display: flex;
        }
        .target-label {
            font-size: min(6vw, 2rem);
            background: #fefbda;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #3f8520;
            color: #235c0e;
            font-weight: bold;
            box-shadow: 0 3px 0 #3f8520;
        }
        .target-words {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 8px;
        }
        .target-word-chip {
            background: #fefbda;
            font-size: min(4.5vw, 1.8rem);
            padding: 6px 12px;
            border-radius: 40px;
            border: 3px solid #3f8520;
            font-weight: bold;
            color: #235c0e;
            box-shadow: 0 3px 0 #2b6e3f;
            white-space: nowrap;
        }

        /* 可拖拽卡片区域 - 保证背景可见 */
        .drag-area {
            background: #fce2b1;
            border-radius: 50px 50px 25px 25px;
            padding: 20px 10px;
            border: 4px solid #e5a157;
            box-shadow: inset 0 -3px 0 #c57c3c, 0 12px 15px rgba(160, 100, 40, 0.3);
            margin-bottom: 20px;
            min-height: 140px; /* 确保即使无卡片也有高度 */
        }
        .sortable-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 8px;
            list-style: none;
            padding: 0;
            margin: 0;
            min-height: 100px;
        }
        .word-item {
            background: #ffd58c;
            background-image: radial-gradient(circle at 8px 8px, #ffe3ac, #ffbe5e);
            font-size: min(6vw, 2.2rem);  /* 动态调整，最大2.2rem */
            font-weight: 800;
            color: #3f280b;
            padding: 10px 18px;
            border-radius: 50px;
            border: 4px solid #f0872b;
            box-shadow: 0 6px 0 #b35f1b, 0 5px 10px rgba(0,0,0,0.2);
            cursor: grab;
            transition: transform 0.15s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal;        /* 允许换行 */
            word-break: keep-all;       /* 中文词语不断开 */
            max-width: 85vw;            /* 最大宽度为视口的85% */
            line-height: 1.3;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;          /* 防止拖动时页面滚动 */
        }

        /* 多彩卡片背景 */
        .word-item:nth-child(1) { background: #ffb47b; border-color: #d45d2c; }
        .word-item:nth-child(2) { background: #a9d6e5; border-color: #2a7f9c; box-shadow: 0 6px 0 #1b5f77; }
        .word-item:nth-child(3) { background: #f7c35c; border-color: #c58a1a; }
        .word-item:nth-child(4) { background: #c5a1ff; border-color: #6a3bb3; }
        .word-item:nth-child(5) { background: #ffa5d2; border-color: #ba2d7a; }
        .word-item:nth-child(6) { background: #b0e57c; border-color: #4d9e2a; }
        .word-item:nth-child(7) { background: #ffb37c; border-color: #c06018; }
        .word-item:nth-child(8) { background: #e0b0ff; border-color: #803dbb; }

        .word-item:active {
            cursor: grabbing;
            transform: scale(0.97);
            filter: brightness(0.96);
        }
        .sortable-ghost {
            opacity: 0.4;
            background: #c0c0c0 !important;
            border: 4px dashed #888 !important;
            box-shadow: none !important;
        }
        .sortable-drag {
            opacity: 0.9;
            transform: rotate(1deg) scale(1.03);
            box-shadow: 0 15px 20px rgba(0,0,0,0.4) !important;
        }

        .button-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 8px;
            margin: 15px 0 12px 0;
        }
        .btn {
            font-size: min(4.5vw, 1.8rem);
            font-weight: bold;
            padding: 10px 16px;
            border: none;
            border-radius: 50px;
            background-color: #fcf3da;
            border: 4px solid #fcb375;
            box-shadow: 0 5px 0 #b16421, 0 5px 10px rgba(0,0,0,0.2);
            color: #6b3f12;
            cursor: pointer;
            transition: all 0.06s linear;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex: 0 1 auto;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b16421, 0 5px 10px rgba(0,0,0,0.1);
        }
        .btn.check { background: #c9e3ae; border-color: #509e2c; box-shadow: 0 5px 0 #36701a; color: #1b4e0a; }
        .btn.reset { background: #ffcfb0; border-color: #e2723b; box-shadow: 0 5px 0 #9e4d21; }
        .btn.shuffle { background: #b5d8ff; border-color: #3c82c9; box-shadow: 0 5px 0 #1d4f8b; }
        .btn.answer { background: #fcc0dd; border-color: #c63b7c; box-shadow: 0 5px 0 #872253; color: #4f1836; }

        .result-area {
            background: #ffeac2;
            border-radius: 40px;
            padding: 15px 12px;
            margin-top: 15px;
            text-align: center;
            font-size: min(4.5vw, 2rem);
            font-weight: bold;
            border: 4px solid #e7a14e;
            box-shadow: inset 0 -2px 0 #b46f2b, 0 5px 0 #9b601d;
            color: #5a3000;
        }
        .result-emoji { font-size: 2.2rem; margin-right: 8px; vertical-align: middle; }

        .footer-hint {
            font-size: min(4vw, 1.5rem);
            color: #a1581c;
            margin: 15px 0 5px 0;
            text-align: center;
            background: #fcf0d6;
            border-radius: 30px;
            padding: 5px 10px;
            border: 3px solid #eb9f5a;
        }

        /* 极端小屏幕的额外缩小 */
        @media (max-width: 380px) {
            .word-item {
                font-size: min(5.5vw, 1.8rem);
                padding: 8px 12px;
            }
            .btn {
                font-size: min(4vw, 1.5rem);
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>✨ 词句小侦探 ✨</h1>
        <div style="text-align: center;"><span class="subhead">多题挑战 · 拖拖乐</span></div>

        <!-- 导航 + 题号 -->
        <div class="nav-panel">
            <button class="nav-btn" id="prevBtn" disabled>◀ 上一题</button>
            <span class="question-badge" id="questionCounter">第 1 / 24 题</span>
            <button class="nav-btn" id="nextBtn">下一题 ▶</button>
        </div>

        <!-- 目标句子提示牌（默认隐藏） -->
        <div id="targetSentence" class="target-sentence">
            <span class="target-label">🎯</span>
            <div class="target-words" id="targetWordsContainer"></div>
        </div>

        <!-- 可拖拽卡片区域 - 卡片会动态生成在这里 -->
        <div class="drag-area">
            <div id="sortable-list" class="sortable-list"></div>
        </div>

        <!-- 控制按钮组 -->
        <div class="button-panel">
            <button class="btn check" id="checkBtn">✅ 检查答案</button>
            <button class="btn reset" id="resetBtn">🔄 重置顺序</button>
            <button class="btn shuffle" id="shuffleBtn">🎲 打乱顺序</button>
            <button class="btn answer" id="answerBtn">🔍 显示答案</button>
        </div>

        <!-- 结果显示区 -->
        <div class="result-area" id="resultMessage">
            <span class="result-emoji">🧸</span> 等你来排列～
        </div>
        <div class="footer-hint">
            💡 按住词语拖一拖，松开小手就排好！ 共有24道题哦
        </div>
    </div>

    <script>
        (function() {
            // ---------- 题库 (24题, 5~8个词语) ----------
            const questions = [
                { correct: ["我们", "应该", "一起", "爱护", "花草树木"] },
                { correct: ["今天", "我", "去", "公园", "玩"] },
                { correct: ["妈妈", "每天", "给", "我", "讲", "故事"] },
                { correct: ["小猫", "喜欢", "吃", "鱼", "和", "睡觉"] },
                { correct: ["我", "有", "一个", "温暖", "的", "家"] },
                { correct: ["太阳", "从", "东方", "慢慢", "升起"] },
                { correct: ["请", "你", "把", "玩具", "收拾", "整齐"] },
                { correct: ["小朋友", "们", "在", "操场", "上", "跑步"] },
                { correct: ["这", "本", "书", "非常", "有趣"] },
                { correct: ["爸爸", "下班", "回家", "总是", "很晚"] },
                { correct: ["我", "想", "吃", "苹果", "和", "香蕉"] },
                { correct: ["爷爷", "奶奶", "喜欢", "在", "河边", "散步"] },
                { correct: ["春天", "来了", "花儿", "开了", "真美"] },
                { correct: ["大家", "都", "要", "爱护", "环境"] },
                { correct: ["我", "会", "自己", "穿", "衣服", "了"] },
                { correct: ["小燕子", "在", "屋檐下", "忙碌地", "筑巢"] },
                { correct: ["我", "喜欢", "和", "朋友", "一起", "分享", "玩具"] },
                { correct: ["请你", "不要", "在", "教室", "里", "大声", "喧哗"] },
                { correct: ["夜晚", "天空", "中", "有", "无数", "星星"] },
                { correct: ["我们", "要", "节约", "用水", "用电"] },
                { correct: ["小兔子", "爱吃", "萝卜", "和", "青菜"] },
                { correct: ["老师", "教", "我们", "唱歌", "跳舞"] },
                { correct: ["河边", "有", "一只", "白色", "的", "天鹅"] },
                { correct: ["妹妹", "把", "糖果", "偷偷", "藏", "了", "起来"] }
            ];

            let currentIndex = 0;
            const totalQuestions = questions.length;

            // DOM 元素
            const container = document.getElementById('sortable-list');
            const targetSentenceDiv = document.getElementById('targetSentence');
            const targetWordsContainer = document.getElementById('targetWordsContainer');
            const resultDiv = document.getElementById('resultMessage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const questionCounter = document.getElementById('questionCounter');

            // 初始化 Sortable (拖拽)
            let sortableInstance = new Sortable(container, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
                easing: "cubic-bezier(0.4, 0.0, 0.2, 1)",
                touchStartThreshold: 2,
                direction: 'horizontal',
                forceFallback: false,
                onEnd: function() {
                    // 用户拖拽后隐藏答案提示，更新提示语
                    targetSentenceDiv.classList.remove('visible');
                    resultDiv.innerHTML = '<span class="result-emoji">🐼</span> 继续调整～ 好了就点“检查答案”！';
                    resultDiv.style.background = '#ffeac2';
                    resultDiv.style.borderColor = '#e7a14e';
                }
            });

            // 打乱数组 (用于初始显示)
            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            // 更新顶部答案提示牌 (隐藏或显示由类控制)
            function updateTargetChips(correctArr) {
                targetWordsContainer.innerHTML = '';
                correctArr.forEach(word => {
                    const span = document.createElement('span');
                    span.className = 'target-word-chip';
                    span.textContent = word;
                    targetWordsContainer.appendChild(span);
                });
            }

            // 渲染当前题目 (创建卡片，打乱顺序)
            function renderCurrentQuestion() {
                const correct = questions[currentIndex].correct;
                updateTargetChips(correct);
                const shuffled = shuffleArray(correct);
                container.innerHTML = '';  // 清空原有卡片
                shuffled.forEach(word => {
                    const div = document.createElement('div');
                    div.className = 'word-item';
                    div.textContent = word;
                    div.setAttribute('data-word', word);
                    container.appendChild(div);
                });
                // 确保答案框隐藏
                targetSentenceDiv.classList.remove('visible');
                // 重置提示信息
                resultDiv.innerHTML = '<span class="result-emoji">🧸</span> 新题目！来排一排吧～';
                resultDiv.style.background = '#ffeac2';
                resultDiv.style.borderColor = '#e7a14e';
                // 更新题号
                questionCounter.textContent = `第 ${currentIndex+1} / ${totalQuestions} 题`;
                // 更新按钮状态
                prevBtn.disabled = (currentIndex === 0);
                nextBtn.disabled = (currentIndex === totalQuestions - 1);
            }

            // 获取当前卡片顺序 (文本数组)
            function getCurrentWordOrder() {
                const items = document.querySelectorAll('#sortable-list .word-item');
                return Array.from(items).map(item => item.textContent.trim());
            }

            // 检查答案
            function checkAnswer() {
                const currentOrder = getCurrentWordOrder();
                const correct = questions[currentIndex].correct;
                const isCorrect = currentOrder.length === correct.length && 
                                  currentOrder.every((word, idx) => word === correct[idx]);
                if (isCorrect) {
                    resultDiv.innerHTML = '<span class="result-emoji">🏆✨</span> 太棒啦！顺序完全正确！ ✨🏆';
                    resultDiv.style.background = '#d9ffb8';
                    resultDiv.style.borderColor = '#58b82e';
                } else {
                    resultDiv.innerHTML = '<span class="result-emoji">🤔🔍</span> 再试试看？调整一下词语顺序吧～';
                    resultDiv.style.background = '#ffeac2';
                    resultDiv.style.borderColor = '#e7a14e';
                }
            }

            // 事件绑定
            document.getElementById('checkBtn').addEventListener('click', checkAnswer);

            document.getElementById('resetBtn').addEventListener('click', function() {
                const correct = questions[currentIndex].correct;
                const shuffled = shuffleArray(correct);
                container.innerHTML = '';
                shuffled.forEach(word => {
                    const div = document.createElement('div');
                    div.className = 'word-item';
                    div.textContent = word;
                    div.setAttribute('data-word', word);
                    container.appendChild(div);
                });
                targetSentenceDiv.classList.remove('visible');
                resultDiv.innerHTML = '<span class="result-emoji">🔄</span> 顺序已重置，重新试试吧！';
                resultDiv.style.background = '#ffeac2';
                resultDiv.style.borderColor = '#e7a14e';
            });

            document.getElementById('shuffleBtn').addEventListener('click', function() {
                const items = document.querySelectorAll('#sortable-list .word-item');
                const itemArray = Array.from(items);
                // Fisher-Yates 打乱并重新插入
                const shuffledArray = [...itemArray];
                for (let i = shuffledArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledArray[i], shuffledArray[j]] = [shuffledArray[j], shuffledArray[i]];
                }
                shuffledArray.forEach(node => container.appendChild(node));
                targetSentenceDiv.classList.remove('visible');
                resultDiv.innerHTML = '<span class="result-emoji">🎲</span> 打乱啦～ 再排排看！';
                resultDiv.style.background = '#ffeac2';
                resultDiv.style.borderColor = '#e7a14e';
            });

            document.getElementById('answerBtn').addEventListener('click', function() {
                const correct = questions[currentIndex].correct;
                const items = document.querySelectorAll('#sortable-list .word-item');
                const itemArray = Array.from(items);
                correct.forEach(targetWord => {
                    const matchedItem = itemArray.find(item => item.textContent.trim() === targetWord);
                    if (matchedItem) container.appendChild(matchedItem);
                });
                targetSentenceDiv.classList.add('visible');
                resultDiv.innerHTML = '<span class="result-emoji">🌟</span> 这是正确的顺序！你可以参考它～';
                resultDiv.style.background = '#c5e0ff';
                resultDiv.style.borderColor = '#3b8bc9';
            });

            prevBtn.addEventListener('click', function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderCurrentQuestion();
                }
            });

            nextBtn.addEventListener('click', function() {
                if (currentIndex < totalQuestions - 1) {
                    currentIndex++;
                    renderCurrentQuestion();
                }
            });

            // 启动第一题
            renderCurrentQuestion();
        })();
    </script>
    <!-- 万一 JavaScript 未能加载，显示提示（极少情况） -->
    <noscript>
        <div style="background:red; color:white; padding:1rem; text-align:center;">
            您的浏览器未支持JavaScript，请启用后重试。
        </div>
    </noscript>
</body>
</html>
